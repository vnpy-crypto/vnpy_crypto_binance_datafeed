name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest ruff mypy
      - name: Lint with ruff
        run: ruff check .
      - name: Check format with ruff
        run: ruff format --check .
      - name: Type check with mypy
        run: mypy vnpy_binance_datafeed/
      - name: Test with pytest
        run: pytest tests/ -v -m "not e2e" --ignore=tests/test_data_consistency.py --ignore=tests/test_missing_timestamps.py